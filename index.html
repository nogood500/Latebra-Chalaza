<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Latebra Chalaza</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1 class="title">Latebra Chalaza</h1>
        <p class="subtitle">A shelter for the sense of dissonance.</p>
    </header>

    <main class="stream">
        <article class="zettel" style="--drift-x: -2; --drift-y: 1;">
            <div class="meta"><time datetime="2026-03-12">2026.03.12</time></div>
            <div class="content">
                <p>整理とは減らすこと、不整頓とは並べないこと。<br>
                この島には、並べるための棚はない。</p>
            </div>
        </article>

        <article class="zettel" style="--drift-x: 3; --drift-y: -1;">
            <div class="meta"><time datetime="2026-03-11">2026.03.11</time></div>
            <div class="content">
                <p>違和の感覚は、発明ではなく発見である。<br>
                論理に先立つ「何かがおかしい」という引っかかりだけを信じる。</p>
            </div>
        </article>

        <article class="zettel" style="--drift-x: -1; --drift-y: 2;">
            <div class="meta"><time datetime="2026-03-09">2026.03.09</time></div>
            <div class="content">
                <p>つんのめりながら進む。<br>
                着地でもなく、加速でもなく、倒れ込むエネルギーだけで。</p>
            </div>
        </article>
    </main>
</body>
</html>
